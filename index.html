<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>
<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:50px;
}

h1{
color:#ff2d55;
font-size:50px;
}

.card{
max-width:700px;
margin:auto;
padding:30px;
border:2px solid #ff2d55;
border-radius:20px;
background:#1a1a1a;
}

button{
background:#ff2d55;
color:white;
padding:15px 30px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

#pesan{
display:none;
margin-top:20px;
font-size:20px;
}
</style>
</head>

<body>

<div class="card">

<h1>❤️ Happy Birthday ❤️</h1>

<h2>NAMA PACAR</h2>

<p>
Selamat ulang tahun sayangku.
Semoga semua impianmu tercapai dan selalu bahagia.
</p>

<button onclick="document.getElementById('pesan').style.display='block'">
Buka Pesan Rahasia ❤️
</button>

<div id="pesan">
<p>
ISI PESAN ROMANTIS DI SINI 🥰❤️
</p>
</div>

</div>

</body>
</html>

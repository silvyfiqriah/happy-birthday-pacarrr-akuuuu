<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ridwan ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
}

.hero{
height:100vh;
background:url('foto1.jpeg');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
}

.content{
position:relative;
z-index:2;
color:white;
padding:20px;
}

h1{
font-size:60px;
margin-bottom:10px;
}

h2{
font-size:35px;
color:#ffcccc;
margin-bottom:20px;
}

p{
font-size:18px;
margin-bottom:25px;
}

.btn{
padding:15px 35px;
border:none;
border-radius:30px;
background:#c1121f;
color:white;
font-size:18px;
cursor:pointer;
}

.heart{
position:absolute;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="hero">

<div class="overlay"></div>

<div class="content">

<h1>Happy Birthday ❤️</h1>

<h2>Ridwan Mashuri</h2>

<p>
A little gift made with love just for you.
</p>

<button class="btn" onclick="window.location.href='menu.html'">
Click Here
</button>

</div>

</div>

<audio autoplay loop>
<source src="riskitall.mp3" type="audio/mpeg">
</audio>

<script>

for(let i=0;i<50;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(15+Math.random()*20)+"px";

heart.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(heart);

}

</script>

</body>
</html>

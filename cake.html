<body>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1 class="title">Happy Birthday My Love ❤️</h1>

<div class="cake">

    <div class="layer1">
        <div class="cream"></div>
    </div>

    <div class="layer2">
        <div class="cream"></div>
    </div>

    <div class="layer3">
        <div class="cream"></div>
    </div>

    <div class="candle">
        <div class="flame" id="flame"></div>
    </div>

</div>

<button onclick="blowCandle()">
    🎂 Blow The Candle
</button>

<div class="message" id="message">
    Make A Wish 💖✨
</div>

</div>

<script>

// ================= MUSIC =================

const music = document.getElementById("bgMusic");

// Ambil posisi lagu sebelumnya
const savedTime = localStorage.getItem("musicTime");

if(savedTime){
    music.currentTime = savedTime;
}

// Mainkan musik saat klik pertama
document.addEventListener("click", () => {

    if(music.paused){
        music.play();
    }

}, { once:true });

// Simpan posisi lagu tiap detik
setInterval(() => {

    localStorage.setItem(
        "musicTime",
        music.currentTime
    );

}, 1000);


// ================= CAKE =================

function blowCandle(){

    document.getElementById("flame").style.display = "none";

    document.getElementById("message").style.display = "block";

    confetti();

    // Pindah ke halaman message setelah 4 detik
    setTimeout(() => {

        window.location.href = "message.html";

    }, 4000);

}


// ================= CONFETTI =================

function confetti(){

    for(let i = 0; i < 150; i++){

        let c = document.createElement("div");

        c.className = "confetti";

        c.style.left =
        Math.random() * window.innerWidth + "px";

        c.style.background =
        `hsl(${Math.random()*360},100%,50%)`;

        c.style.animationDuration =
        (Math.random()*3+2) + "s";

        document.body.appendChild(c);

        setTimeout(() => {

            c.remove();

        }, 5000);

    }

}

</script>

</body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Cake</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to top, #ffdde1, #ee9ca7);
      font-family: Arial, sans-serif;
    }

    .card {
      text-align: center;
    }

    .cake {
      position: relative;
      width: 200px;
      height: 180px;
      margin: auto;
    }

    /* cake base */
    .layer {
      position: absolute;
      width: 200px;
      height: 60px;
      background: #ff6f91;
      border-radius: 10px;
      bottom: 0;
    }

    .layer2 {
      width: 160px;
      height: 50px;
      background: #ff9671;
      bottom: 60px;
      left: 20px;
    }

    .layer3 {
      width: 120px;
      height: 45px;
      background: #ffc75f;
      bottom: 110px;
      left: 40px;
    }

    /* candles */
    .candle {
      position: absolute;
      width: 10px;
      height: 30px;
      background: white;
      top: 20px;
      left: 95px;
    }

    .flame {
      position: absolute;
      width: 12px;
      height: 12px;
      background: orange;
      border-radius: 50%;
      top: -10px;
      left: -1px;
      animation: flicker 0.3s infinite alternate;
    }

    @keyframes flicker {
      from { transform: scale(1); opacity: 1; }
      to { transform: scale(1.3); opacity: 0.7; }
    }

    h1 {
      margin-top: 20px;
      color: white;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    p {
      color: white;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="cake">
      <div class="layer layer3"></div>
      <div class="layer layer2"></div>
      <div class="layer"></div>

      <div class="candle">
        <div class="flame"></div>
      </div>
    </div>

    <h1>🎂 Happy Birthday My Love 🎂</h1>
    <p>You are my everything ❤️</p>
  </div>
</body>
</html>
